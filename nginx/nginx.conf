# NGINX API Gateway Configuration
# Routes requests to: user-service, movie-service, recommendation-service
# Auth is handled by user-service

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with request body logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Rate limiting for auth endpoints
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

    # Upstream services
    upstream user_service {
        server user-service:3000;
        keepalive 32;
    }

    upstream movie_service {
        server movie-service:8080;
        keepalive 32;
    }

    upstream recommendation_service {
        server recommendation-service:8080;
        keepalive 32;
    }

    # Monitoring services
    upstream prometheus {
        server prometheus:9090;
        keepalive 32;
    }

    upstream grafana {
        server grafana:3000;
        keepalive 32;
    }

    # Shared map for JWT validation cache (optional caching)
    map $http_authorization $auth_header {
        "~*^Bearer " $http_authorization;
        default "";
    }

    # Main API Gateway Server
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Health check endpoint for load balancers
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Forward all HTTPS traffic (if configured)
        return 301 https://$host$request_uri;
    }

    # HTTPS Server (when certificates are configured)
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name _;

        # SSL Certificates (replace with your actual paths)
        # ssl_certificate /etc/nginx/certs/server.crt;
        # ssl_certificate_key /etc/nginx/certs/server.key;
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers HIGH:!aNULL:!MD5;
        # ssl_prefer_server_ciphers on;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,X-Total-Count,X-Page-Number' always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' '0';
            return 204;
        }

        # ============================================
        # AUTHENTICATION SERVICE ROUTES
        # ============================================
        location ~ ^/api/auth(/.*)?$ {
            limit_req zone=auth_limit burst=10 nodelay;

            proxy_pass http://user_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 30s;
            proxy_connect_timeout 30s;
        }

        location ~ ^/api/users(/.*)?$ {
            limit_req zone=auth_limit burst=10 nodelay;

            # Verify JWT token from Authorization header
            # This should validate against user-service
            proxy_pass http://user_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 30s;
            proxy_connect_timeout 30s;
        }

        # ============================================
        # MOVIE SERVICE ROUTES
        # ============================================
        location ~ ^/api/v1/movies(/.*)?$ {
            # Check for valid JWT token before allowing access
            # Optional: Add auth check here if movies require authentication
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://movie_service;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 30s;

            # Caching for GET requests
            proxy_cache_methods GET HEAD;
            proxy_cache_valid 200 10m;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ============================================
        # RECOMMENDATION SERVICE ROUTES
        # ============================================
        location ~ ^/api/recommendation(/.*)?$ {
            # Require authentication for recommendations
            if ($http_authorization = '') {
                return 401 '{"error":"Unauthorized"}';
            }

            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://recommendation_service;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-Token $http_authorization;
            proxy_read_timeout 60s;
            proxy_connect_timeout 30s;
        }

        location ~ ^/api/ratings(/.*)?$ {
            # Require authentication for ratings
            if ($http_authorization = '') {
                return 401 '{"error":"Unauthorized"}';
            }

            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://recommendation_service;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-Token $http_authorization;
            proxy_read_timeout 30s;
            proxy_connect_timeout 30s;
        }

        # ============================================
        # MONITORING & OBSERVABILITY ROUTES
        # ============================================
        location /metrics {
            # Optional: Restrict metrics access by IP
            # allow 10.0.0.0/8;
            # deny all;

            proxy_pass http://recommendation_service:8080/actuator/metrics;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }

        location /prometheus {
            # Restrict Prometheus access
            # allow 10.0.0.0/8;
            # deny all;

            proxy_pass http://prometheus/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 90s;
        }

        location /grafana {
            # Restrict Grafana access
            # allow 10.0.0.0/8;
            # deny all;

            proxy_pass http://grafana/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================
        # ROOT & CATCH-ALL
        # ============================================
        location / {
            # API documentation or info endpoint
            return 404 '{"error":"Not Found","message":"Use /api/* routes for the API"}';
            add_header Content-Type application/json;
        }

        # Deny access to sensitive files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # HTTP redirect server (redirects to HTTPS)
    server {
        listen 80;
        listen [::]:80;
        server_name _;
        return 301 https://$host$request_uri;
    }
}
