events {
  worker_connections 1024;
}

http {

  # ── Upstream definitions ─────────────────────────────────────────────────
  upstream recommendation_service {
    server recommendation-service:8080;
  }

  upstream movie_service {
    server movie-service:8080;
  }

  upstream user_service {
    server user-service:3000;
  }

  upstream grafana {
    server grafana:3000;
  }

  upstream prometheus {
    server prometheus:9090;
  }

  upstream rabbitmq_ui {
    server rabbitmq:15672;
  }

  # ── Logging ───────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $request_method $request_uri $status '
                  '"$http_user_agent"';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log  warn;

  # ── Main server block ─────────────────────────────────────────────────────
  server {
    listen 80;
    server_name localhost;

    # Shared proxy headers — NOTE: these are inherited by location blocks
    # ONLY if that location block sets NO proxy_set_header of its own.
    # If a location needs extra headers, re-declare all of these there too.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── API routes ──────────────────────────────────────────────────────────

    location /api/recommendations/ {
      proxy_pass http://recommendation_service/;
    }

    location /api/movies/ {
      proxy_pass http://movie_service/;
    }

    location /api/users/ {
      proxy_pass http://user_service/;
    }

    # ── Observability UIs ───────────────────────────────────────────────────

    location /grafana/ {
      proxy_pass http://grafana/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Authorization     $http_authorization;

      proxy_redirect http://localhost:3000/ http://$host/;
    }

    # Prometheus — requires --web.external-url=/prometheus/ and
    # --web.route-prefix=/prometheus/ flags on the prometheus container
    location /prometheus/ {
      proxy_pass     http://prometheus/prometheus/;
      proxy_redirect off;
    }

    # RabbitMQ management UI — must re-declare all shared headers because
    # any proxy_set_header in a location block cancels server-level ones
    location /rabbitmq/ {
      proxy_pass http://rabbitmq_ui/;

      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # WebSocket support required by RabbitMQ management UI
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # ── Health check ────────────────────────────────────────────────────────
    location /health {
      access_log off;
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }
  }
}