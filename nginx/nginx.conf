events {
  worker_connections 1024;
}

http {

  # ── Upstream definitions ─────────────────────────────────────────────────
  upstream recommendation_service {
    server recommendation-service:8080;
  }

  upstream movie_service {
    server movie-service:8080;   # internal port, not the host-mapped 8081
  }

  upstream user_service {
    server user-service:3000;    # internal port, not the host-mapped 8082
  }

  upstream grafana {
    server grafana:3000;
  }

  upstream prometheus {
    server prometheus:9090;
  }

  upstream rabbitmq_ui {
    server rabbitmq:15672;
  }

  # ── Logging ───────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $request_method $request_uri $status '
                  '"$http_user_agent"';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log  warn;

  # ── Main server block ─────────────────────────────────────────────────────
  server {
    listen 80;
    server_name localhost;

    # Shared proxy headers applied to all locations
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── API routes ──────────────────────────────────────────────────────────

    # Recommendation Service  →  /api/recommendations/...
    location /api/recommendations/ {
      proxy_pass http://recommendation_service/;
    }

    # Movie Service  →  /api/movies/...
    location /api/movies/ {
      proxy_pass http://movie_service/;
    }

    # User / Auth Service  →  /api/users/...
    location /api/users/ {
      proxy_pass http://user_service/;
    }

    # ── Observability UIs ───────────────────────────────────────────────────

    # Grafana  →  /grafana/
    location /grafana/ {
      proxy_pass http://grafana/;

      # Required for Grafana sub-path to work correctly
      proxy_set_header Authorization $http_authorization;
      rewrite ^/grafana/(.*)$ /$1 break;
    }

    # Prometheus  →  /prometheus/
    location /prometheus/ {
      proxy_pass         http://prometheus/prometheus/;
      proxy_redirect     off;
    }

    # RabbitMQ Management UI  →  /rabbitmq/
    location /rabbitmq/ {
      proxy_pass http://rabbitmq_ui/;

      # RabbitMQ management needs these for websocket support
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # ── Health check endpoint ───────────────────────────────────────────────
    location /health {
      access_log off;
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }
  }
}